<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Career Portal</title>
  <base href="/">
  <link rel="stylesheet" href="./static/custom.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet" />
  <script src="https://trust-snippet.bullhornstaffing.com/trust-snippet.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      try {
        const raw = await fetch('./app.json');
        const appData = await raw.json();
        Trust.start({corpToken: appData.service.corpToken});
      } catch(err) {
        console.error("[TrustSnippet] Failed to start session:", err);
      }
    });
  </script>
  <script>
    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
    (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
    m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
  </script>
</head>
<body class="min-h-screen bg-background text-foreground antialiased">
  <app-root>
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
      <div style="width:2rem;height:2rem;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </app-root>
</body>
</html>
