<div class="bg-background rounded-lg shadow-xl w-full max-w-lg max-h-[90vh] flex flex-col">

  <!-- Header -->
  <div class="flex items-start justify-between p-5 border-b border-border">
    <div>
      <h2 class="font-semibold text-lg text-foreground">{{ data.job.title }}</h2>
      <p *ngIf="data.job.publishedCategory && showCategory" class="text-sm text-muted-foreground">
        {{ data.job.publishedCategory?.name }}
      </p>
      <p class="text-sm text-muted-foreground">
        {{ data.job.address?.city }}<span *ngIf="data.job.address?.city && data.job.address?.state">, </span>
        {{ data.job.address?.state }}
        <span *ngIf="data.job.employmentType"> · {{ data.job.employmentType }}</span>
      </p>
    </div>
    <button type="button" class="btn-icon shrink-0 ml-4" (click)="close()">
      <lucide-angular [img]="icons.X" [size]="18"></lucide-angular>
    </button>
  </div>

  <!-- Form body -->
  <div class="overflow-y-auto flex-1 p-5">
    <form [formGroup]="form" class="flex flex-col gap-4">

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
          <label class="label">{{ 'FIRST_NAME' | translate }} *</label>
          <input class="input" formControlName="firstName" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="label">{{ 'LAST_NAME' | translate }} *</label>
          <input class="input" formControlName="lastName" />
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label class="label">{{ 'EMAIL' | translate }} *</label>
        <input class="input" type="email" formControlName="email" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="label">{{ 'PHONE' | translate }}</label>
        <input class="input" type="tel" formControlName="phone" />
      </div>

      <!-- Resume upload -->
      <div class="flex flex-col gap-1">
        <label class="label">{{ 'RESUME' | translate }} *</label>
        <label class="flex flex-col items-center justify-center border-2 border-dashed border-border rounded-md p-6 cursor-pointer hover:bg-muted/50 transition-colors">
          <lucide-angular [img]="icons.Check" [size]="20" class="text-muted-foreground mb-2"
                          *ngIf="!selectedFile"></lucide-angular>
          <span class="text-sm text-muted-foreground">
            {{ selectedFile ? selectedFile.name : ('ACCEPTED_RESUME' | translate) }}
          </span>
          <input type="file" class="sr-only" (change)="onFileChange($event)" />
        </label>
        <p *ngIf="fileError" class="text-xs text-destructive">{{ fileError }}</p>
      </div>

      <!-- EEOC section -->
      <ng-container *ngIf="showEeoc">
        <div class="border-t border-border pt-4">
          <p class="text-sm font-medium text-foreground mb-3">{{ 'EEOC.EEOC_FORM_DESCRIPTION' | translate }}</p>

          <div *ngIf="eeoc.genderRaceEthnicity" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
              <label class="label">{{ 'EEOC.GENDER_LABEL' | translate }}</label>
              <select class="input" formControlName="gender">
                <option value="">—</option>
                <option *ngFor="let o of genderOptions" [value]="o.value">{{ o.labelKey | translate }}</option>
              </select>
            </div>
            <div class="flex flex-col gap-1">
              <label class="label">{{ 'EEOC.RACE_ETHNICITY_LABEL' | translate }}</label>
              <div class="flex flex-col gap-1.5">
                <label *ngFor="let o of ethnicityOptions" class="flex items-center gap-2 text-sm cursor-pointer">
                  <input type="checkbox" class="h-4 w-4 rounded border-border"
                         [checked]="form.value.ethnicity?.includes(o.value)"
                         (change)="toggleEthnicity(o.value)" />
                  {{ o.labelKey | translate }}
                </label>
              </div>
            </div>
          </div>

          <div *ngIf="eeoc.veteran" class="flex flex-col gap-1 mt-4">
            <label class="label">{{ 'EEOC.VETERAN_LABEL' | translate }}</label>
            <select class="input" formControlName="veteran">
              <option value="">—</option>
              <option *ngFor="let o of veteranOptions" [value]="o.value">{{ o.labelKey | translate }}</option>
            </select>
          </div>

          <div *ngIf="eeoc.disability" class="flex flex-col gap-1 mt-4">
            <label class="label">{{ 'EEOC.DISABILITY_LABEL' | translate }}</label>
            <select class="input" formControlName="disability">
              <option value="">—</option>
              <option *ngFor="let o of disabilityOptions" [value]="o.value">{{ o.labelKey | translate }}</option>
            </select>
          </div>
        </div>
      </ng-container>

      <!-- Consent -->
      <div *ngIf="consentCheckbox" class="flex items-start gap-2 mt-2">
        <input type="checkbox" class="h-4 w-4 mt-0.5 rounded border-border" formControlName="consent" />
        <label class="text-sm text-muted-foreground">
          {{ 'BY_CHECKING_THIS_BOX' | translate }}
          <a (click)="viewPrivacyPolicy()" class="text-primary underline cursor-pointer">
            {{ 'PRIVACY_POLICY' | translate }}
          </a>
        </label>
      </div>

      <p *ngIf="hasError" class="text-sm text-destructive">{{ 'ERROR_WHILE_APPLYING' | translate }}</p>
    </form>
  </div>

  <!-- Footer -->
  <div class="flex justify-end gap-3 p-4 border-t border-border">
    <button type="button" class="btn-outline" (click)="close()" data-automation-id="create-modal-cancel">
      {{ 'CANCEL' | translate }}
    </button>
    <button type="button" class="btn-primary" [disabled]="!form.valid || !selectedFile || applying"
            (click)="save()" data-automation-id="apply-modal-save">
      <span *ngIf="applying" class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent mr-2 inline-block"></span>
      {{ 'APPLY' | translate }}
    </button>
  </div>

</div>
