<div class="flex flex-col gap-2">
  <button
    type="button"
    class="flex items-center justify-between w-full text-sm font-semibold text-foreground py-1 hover:text-primary transition-colors"
    (click)="toggle()">
    <span>{{ title }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         [class.rotate-180]="expanded" class="transition-transform shrink-0">
      <path d="m6 9 6 6 6-6"/>
    </svg>
  </button>

  <div *ngIf="loading && expanded" class="flex justify-center py-2">
    <div class="h-4 w-4 animate-spin rounded-full border-2 border-border border-t-primary"></div>
  </div>

  <div *ngIf="!loading && expanded" class="flex flex-col gap-1.5 max-h-52 overflow-y-auto pr-1">
    <label *ngFor="let option of options"
           class="flex items-center gap-2 text-sm text-foreground cursor-pointer hover:text-primary">
      <input
        type="checkbox"
        [(ngModel)]="option.checked"
        (ngModelChange)="onCheckChange()"
        class="h-4 w-4 rounded border-border text-primary focus:ring-primary" />
      <span>{{ option.label }}</span>
    </label>
    <p *ngIf="options.length === 0" class="text-xs text-muted-foreground py-1">No options available</p>
  </div>
</div>
