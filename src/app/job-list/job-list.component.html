<!-- Loading skeleton -->
<div *ngIf="loading" class="flex flex-col gap-3">
  <div *ngFor="let i of [1,2,3,4,5]"
       class="rounded-lg border border-border bg-card p-4 animate-pulse">
    <div class="h-5 w-2/3 rounded bg-muted mb-2"></div>
    <div class="h-3 w-1/3 rounded bg-muted mb-3"></div>
    <div class="h-3 w-full rounded bg-muted"></div>
  </div>
</div>

<ng-container *ngIf="!loading">
  <!-- Header bar -->
  <div class="flex items-center justify-between mb-4">
    <p class="text-sm text-muted-foreground">
      {{ 'OPEN_POSITIONS' | translate }} ({{ total }})
    </p>
    <button type="button" class="btn-outline md:hidden text-sm" (click)="openSidebar()">
      <lucide-angular [img]="icons.SlidersHorizontal" [size]="16" class="mr-2"></lucide-angular>
      {{ 'FILTER' | translate }}
    </button>
  </div>

  <!-- Job cards -->
  <div *ngIf="jobs.length > 0" class="flex flex-col gap-3">
    <div *ngFor="let job of jobs"
         class="rounded-lg border border-border bg-card p-4 hover:shadow-md transition-shadow cursor-pointer"
         [routerLink]="'jobs/' + job.id"
         (click)="loadJob(job.id)">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <a [href]="'jobs/' + job.id" [routerLink]="'jobs/' + job.id"
             class="font-semibold text-base hover:text-primary hover:underline line-clamp-1">
            {{ job.title }}
          </a>
          <span *ngIf="job.publishedCategory && showCategory"
                class="text-xs text-muted-foreground block mt-0.5">
            {{ job.publishedCategory?.name }}
          </span>
          <p class="text-sm text-muted-foreground mt-1 line-clamp-2">
            {{ job.publicDescription | stripHtml }}
          </p>
        </div>
        <div class="shrink-0">
          <app-info-chips [job]="job"></app-info-chips>
        </div>
      </div>
    </div>
  </div>

  <!-- Load more -->
  <div *ngIf="moreAvailable" class="flex justify-center mt-6">
    <button class="btn-outline" (click)="loadMore()">Load More</button>
  </div>

  <!-- Empty state -->
  <div *ngIf="jobs.length === 0"
       class="flex flex-col items-center justify-center min-h-[40vh] gap-3 text-muted-foreground">
    <lucide-angular [img]="icons.SearchX" [size]="48"></lucide-angular>
    <p>{{ 'NO_MATCHING_JOBS' | translate }}</p>
  </div>
</ng-container>
