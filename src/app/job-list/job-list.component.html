<!-- Loading skeleton -->
<div *ngIf="loading" class="flex flex-col gap-3">
  <div *ngFor="let i of [1,2,3,4,5]"
       class="rounded-xl border border-border bg-card p-5 animate-pulse">
    <div class="h-5 w-2/5 rounded-full bg-muted mb-3"></div>
    <div class="flex gap-2 mb-4">
      <div class="h-5 w-16 rounded-full bg-muted"></div>
      <div class="h-5 w-20 rounded-full bg-muted"></div>
    </div>
    <div class="h-3 w-full rounded-full bg-muted mb-2"></div>
    <div class="h-3 w-4/5 rounded-full bg-muted"></div>
  </div>
</div>

<ng-container *ngIf="!loading">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <p class="text-sm text-muted-foreground">
      <span class="text-foreground font-semibold">{{ total }}</span> open positions
    </p>
    <button type="button" class="btn-outline md:hidden text-sm gap-1.5" (click)="openSidebar()">
      <lucide-angular [img]="icons.SlidersHorizontal" [size]="14"></lucide-angular>
      Filters
    </button>
  </div>

  <!-- Job cards -->
  <div *ngIf="jobs.length > 0" class="flex flex-col gap-3">
    <div *ngFor="let job of jobs"
         class="rounded-xl border border-border bg-card p-5
                hover:border-border/80 hover:shadow-md transition-all duration-150">

      <!-- Title + chips -->
      <h3 class="font-bold text-[15px] text-foreground leading-snug mb-2">{{ job.title }}</h3>
      <div class="mb-3">
        <app-info-chips [job]="job"></app-info-chips>
      </div>

      <!-- Description -->
      <p class="text-sm text-muted-foreground leading-relaxed line-clamp-2 mb-4">
        {{ job.publicDescription | stripHtml }}
      </p>

      <!-- Footer -->
      <div class="flex items-center justify-between">
        <span *ngIf="job.publishedCategory && showCategory"
              class="text-xs text-muted-foreground">{{ job.publishedCategory?.name }}</span>
        <span *ngIf="!(job.publishedCategory && showCategory)"></span>
        <a [routerLink]="'jobs/' + job.id"
           (click)="loadJob(job.id)"
           class="btn-primary text-sm px-5 py-2 shrink-0">
          View Job
        </a>
      </div>

    </div>
  </div>

  <!-- Load more -->
  <div *ngIf="moreAvailable" class="flex justify-center mt-8">
    <button class="btn-outline text-sm" (click)="loadMore()">Load more positions</button>
  </div>

  <!-- Empty state -->
  <div *ngIf="jobs.length === 0"
       class="flex flex-col items-center justify-center min-h-[40vh] gap-3 text-muted-foreground">
    <lucide-angular [img]="icons.SearchX" [size]="40"></lucide-angular>
    <p class="text-sm">No matching positions found</p>
  </div>
</ng-container>
