<!-- Loading skeleton -->
<div *ngIf="loading" class="flex flex-col gap-2">
  <div *ngFor="let i of [1,2,3,4,5]"
       class="rounded-xl border border-border bg-card p-5 animate-pulse">
    <div class="h-4 w-2/5 rounded-full bg-muted mb-3"></div>
    <div class="h-3 w-1/4 rounded-full bg-muted mb-4"></div>
    <div class="flex gap-2">
      <div class="h-5 w-16 rounded-full bg-muted"></div>
      <div class="h-5 w-20 rounded-full bg-muted"></div>
    </div>
  </div>
</div>

<ng-container *ngIf="!loading">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <p class="text-sm font-medium text-muted-foreground">
      <span class="text-foreground font-semibold">{{ total }}</span> open positions
    </p>
    <button type="button" class="btn-outline md:hidden text-sm gap-1.5" (click)="openSidebar()">
      <lucide-angular [img]="icons.SlidersHorizontal" [size]="14"></lucide-angular>
      Filter
    </button>
  </div>

  <!-- Job cards -->
  <div *ngIf="jobs.length > 0" class="flex flex-col gap-2">
    <a *ngFor="let job of jobs"
       [routerLink]="'jobs/' + job.id"
       (click)="loadJob(job.id)"
       class="group block rounded-xl border border-border bg-card px-5 py-4
              hover:border-foreground/20 hover:shadow-sm transition-all duration-150">

      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <h3 class="font-semibold text-[15px] text-foreground group-hover:text-primary transition-colors leading-snug">
            {{ job.title }}
          </h3>
          <p *ngIf="job.publishedCategory && showCategory"
             class="text-xs text-muted-foreground mt-0.5">
            {{ job.publishedCategory?.name }}
          </p>
        </div>
        <lucide-angular [img]="icons.ArrowRight" [size]="16"
          class="shrink-0 mt-0.5 text-muted-foreground/0 group-hover:text-muted-foreground transition-all translate-x-0 group-hover:translate-x-0.5 duration-150">
        </lucide-angular>
      </div>

      <div class="mt-3">
        <app-info-chips [job]="job"></app-info-chips>
      </div>
    </a>
  </div>

  <!-- Load more -->
  <div *ngIf="moreAvailable" class="flex justify-center mt-8">
    <button class="btn-outline text-sm" (click)="loadMore()">Load more positions</button>
  </div>

  <!-- Empty state -->
  <div *ngIf="jobs.length === 0"
       class="flex flex-col items-center justify-center min-h-[40vh] gap-3 text-muted-foreground">
    <lucide-angular [img]="icons.SearchX" [size]="40"></lucide-angular>
    <p class="text-sm">No matching positions found</p>
  </div>
</ng-container>
